name: Bug report
description: Report a reproducible bug in Laranail Toolkit
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps (or a repository) that reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package version
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
    validations:
      required: true
  - type: input
    id: laravel-version
    attributes:
      label: Laravel version
    validations:
      required: true
